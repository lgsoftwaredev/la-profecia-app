name: la_profecia_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  supabase_flutter: ^2.10.2
  flutter_dotenv: ^5.2.1
  crypto: ^3.0.7
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4
  shared_preferences: ^2.5.3
  firebase_core: ^3.15.2
  firebase_analytics: ^11.3.3
  firebase_messaging: ^15.1.3
  google_mobile_ads: ^5.2.0
  in_app_purchase: ^3.2.0
  in_app_purchase_storekit: ^0.4.0+10
  url_launcher: ^6.3.1
  video_player: ^2.9.2
  flutter_liquid_glass_plus: ^0.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/videos/
    - assets/logo-icons-player-setup/couple/
    - assets/logo-icons-player-setup/friends/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter_24pt-Regular.ttf
          weight: 400
        - asset: fonts/Inter_24pt-Italic.ttf
          weight: 400
          style: italic
        - asset: fonts/Inter_24pt-Medium.ttf
          weight: 500
        - asset: fonts/Inter_24pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: fonts/Inter_24pt-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter_24pt-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: fonts/Inter_24pt-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo-icon-square.png
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_foreground_inset: 0
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/logo-icon-square.png

flutter_native_splash:
  color: "#FFFFFF"
  background_image: assets/background-splash.png
  android_12:
    color: "#0B0715"
    image: assets/logo-icon-square.png
